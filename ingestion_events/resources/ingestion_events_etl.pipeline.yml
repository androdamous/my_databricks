# The main pipeline for ingestion_events

resources:
  pipelines:
    ingestion_events_etl:
      name: ingestion_events_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/ingestion_events_etl"

      libraries:
        - glob:
            include: ../src/ingestion_events_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
