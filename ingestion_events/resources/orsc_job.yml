# A sample job for ingestion_events.

resources:
  jobs:
    orsc_job:
      name: orsc_job

      trigger:
        # Run this job every day, exactly one day from the last run; see https://docs.databricks.com/api/workspace/jobs/create#trigger
        # periodic:
        #   interval: 1
        #   unit: DAYS
        table_update:
          table_names:
          - ${var.catalog}.${var.schema}.ingestion_events

      #email_notifications:
      #  on_failure:
      #    - your_email@example.com

      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${var.schema}

      tasks:
        - task_key: handle_event
          python_wheel_task:
            package_name: event_orchestration
            entry_point: handler
            parameters:
              - "--catalog"
              - "${var.catalog}"
              - "--schema"
              - "${var.schema}"
          environment_key: default
        - task_key: check_dependiencies
          python_wheel_task:
            package_name: event_orchestration
            entry_point: check_dependiencies
            parameters:
              - "--catalog"
              - "${var.catalog}"
              - "--schema"
              - "${var.schema}"
          environment_key: default
        # - task_key: refresh_pipeline
        #   depends_on:
        #     - task_key: notebook_task
        #   pipeline_task:
        #     pipeline_id: ${resources.pipelines.ingestion_events_etl.id}

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              # By default we just include the .whl file generated for the ingestion_events package.
              # See https://docs.databricks.com/dev-tools/bundles/library-dependencies.html
              # for more information on how to add other libraries.
              - ../dist/*.whl
