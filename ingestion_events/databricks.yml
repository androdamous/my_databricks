# This is a Databricks asset bundle definition for ingestion_events.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: ingestion_events
  uuid: 798ef48b-6e01-4bd3-9047-ca9cf3d686bc

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-de078d0d-b410.cloud.databricks.com
    variables:
      catalog: workspace
      schema: default
  prod:
    mode: production
    workspace:
      host: https://dbc-de078d0d-b410.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/androdamous@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/androdamous@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: default
    permissions:
      - user_name: androdamous@gmail.com
        level: CAN_MANAGE
